<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For my Pearl ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div id="mainView">

        <div class="header">
            <div class="heart-icon">❤️</div>

            <h1>To You, my Atchukuttiii ❤️</h1>

            <p class="subtitle">
                A letter for each mile I am away ❤️
            </p>

            <div id="dayCounter" class="day-counter"></div>
        </div>

        <div id="envelopes" class="envelopes"></div>

        <div class="footer-quote">
            "what all love makes someone do.. i am happy doing this tho :]" 💕
        </div>

    </div>

    <div id="gameView" class="game-view">
        <div id="gameCard" class="game-card">
            <div class="game-content">

                <div class="game-header">
                    <h2>Day <span id="gameDay"></span></h2>
                </div>

                <div id="hintSection" class="hint-section"></div>

                <div id="guessesContainer"></div>

                <div id="keyboard" class="keyboard"></div>

                <div class="attempts">
                    Attempts:
                    <span id="attemptCount">0</span>
                </div>

                <div id="gameMessage" class="message"></div>

                <div class="game-back-btn">
                    <button class="back-btn" onclick="closeGame()">
                        Back
                    </button>
                </div>

            </div>
        </div>
    </div>

    <div id="letterView" class="letter-view">
        <div id="letterCard" class="letter-card">
            <div class="letter-content">

                <div class="letter-header">

                    <div class="letter-title-section">
                        <h2 id="letterTitle"></h2>
                        <div id="letterDay" class="letter-day"></div>
                    </div>

                    <button class="close-btn" onclick="closeLetter()">
                        ×
                    </button>

                </div>

                <div id="letterText" class="letter-text"></div>

                <div class="letter-heart">❤️</div>

            </div>
        </div>
    </div>

</div>

<script type="module" src="play.js"></script>

</body>
</html>
